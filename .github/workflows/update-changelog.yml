name: Update Changelog

on:
  repository_dispatch:
    types: [accuratkey-push, trivquic-push]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Fetch recent commits and update changelog
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          APP: ${{ github.event.client_payload.app }}
          COMMIT_MSG: ${{ github.event.client_payload.message }}
          COMMIT_SHA: ${{ github.event.client_payload.sha }}
        run: |
          node << 'JS'
          const fs = require('fs');
          const app = process.env.APP || 'unknown';
          const msg = process.env.COMMIT_MSG || '';
          const sha = (process.env.COMMIT_SHA || '').slice(0,7);
          const date = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

          const pagePath = 'app/page.js';
          let content = fs.readFileSync(pagePath, 'utf8');

          // Build new changelog entry
          const tag = app === 'AccuratKey' ? 'accuratkey' : 'trivquic';
          const color = app === 'AccuratKey' ? '#7c6af7' : '#f59e0b';
          const newEntry = `  { app:"${app}", tag:"${tag}", color:"${color}", date:"${date}", items:["${msg} (${sha})"] },\n`;

          // Insert after CHANGELOG = [
          content = content.replace(
            'const CHANGELOG = [\n',
            `const CHANGELOG = [\n${newEntry}`
          );

          // Keep only latest 10 entries to avoid bloat
          const match = content.match(/const CHANGELOG = \[([\s\S]*?)\];/);
          if (match) {
            const entries = match[1].trim().split(/\n  \},\n/).filter(e => e.trim());
            if (entries.length > 10) {
              const trimmed = entries.slice(0, 10).join('\n  },\n') + '\n  }';
              content = content.replace(
                /const CHANGELOG = \[[\s\S]*?\];/,
                `const CHANGELOG = [\n  ${trimmed}\n];`
              );
            }
          }

          fs.writeFileSync(pagePath, content);
          console.log(`Updated changelog for ${app}: ${msg}`);
          JS
      - name: Commit and push
        run: |
          git config user.email "changelog-bot@studio"
          git config user.name "Changelog Bot"
          git add app/page.js
          git diff --staged --quiet || git commit -m "changelog: update for ${{ github.event.client_payload.app }} — ${{ github.event.client_payload.message }}"
          git push
