name: Update Changelog

on:
  repository_dispatch:
    types: [accuratkey-push, trivquic-push]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Update changelog entry
        env:
          APP: ${{ github.event.client_payload.app }}
          COMMIT_MSG: ${{ github.event.client_payload.message }}
          COMMIT_BODY: ${{ github.event.client_payload.body }}
          COMMIT_SHA: ${{ github.event.client_payload.sha }}
        run: |
          node << 'JS'
          const fs = require('fs');
          const app = process.env.APP || 'Unknown';
          const sha = (process.env.COMMIT_SHA || '').slice(0, 7);
          const date = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
          const tag = app === 'AccuratKey' ? 'accuratkey' : 'trivquic';
          const color = app === 'AccuratKey' ? '#7c6af7' : '#f59e0b';

          // Prefer a "changelog: ..." line from the commit body (plain-English,
          // written for end users) over the raw technical commit subject.
          // Falls back to the subject line if no changelog: line was written.
          const body = process.env.COMMIT_BODY || '';
          const subject = (process.env.COMMIT_MSG || '').replace(/"/g, "'");
          const clMatch = body.match(/changelog:\s*(.+)/i);
          let msg = (clMatch ? clMatch[1].trim() : subject).replace(/"/g, "'");

          // Normalize tone for an actual customer-facing changelog, since
          // these were being copied verbatim from commit messages - which
          // read like internal notes-to-self ("Fix...", "Add...", "Make
          // the icon-sync automation also cover...") rather than release
          // notes. Strip leading first-person imperative verbs into past
          // tense, and trim overly dramatic internal framing.
          msg = msg
            .replace(/^(Fix|Fixed)\b\s*/i, 'Fixed ')
            .replace(/^(Add|Added)\b\s*/i, 'Added ')
            .replace(/^(Remove|Removed)\b\s*/i, 'Removed ')
            .replace(/^(Update|Updated)\b\s*/i, 'Updated ')
            .replace(/^(Build|Built)\b\s*/i, 'Added ')
            .replace(/^(Make|Made)\b\s*/i, 'Improved ')
            .replace(/^(Rebuild|Rebuilt)\b\s*/i, 'Improved ')
            .replace(/^(Extend|Extended)\b\s*/i, 'Improved ')
            .replace(/^(Restore|Restored)\b\s*/i, 'Restored ');
          // Cut at the first sentence boundary so a long, multi-clause
          // commit explanation doesn't read as one run-on changelog line.
          const firstSentence = msg.match(/^[^.!?]*[.!?]/);
          if (firstSentence && firstSentence[0].length > 20) msg = firstSentence[0].trim();
          // Hard safety cap, but on a word boundary with an ellipsis -
          // never mid-sentence with a dangling dash like before.
          if (msg.length > 140) {
            msg = msg.slice(0, 140).replace(/\s+\S*$/, '') + '…';
          }

          const newEntry = `  { app:"${app}", tag:"${tag}", color:"${color}", date:"${date}", items:["${msg}"] },\n`;

          let content = fs.readFileSync('app/page.js', 'utf8');
          content = content.replace('const CHANGELOG = [\n', `const CHANGELOG = [\n${newEntry}`);

          // Keep only 10 entries
          const m = content.match(/const CHANGELOG = \[([\s\S]*?)\];/);
          if (m) {
            const entries = m[1].split(/(?<=\}),\n  (?=\{)/).filter(e => e.trim());
            if (entries.length > 10) {
              const trimmed = entries.slice(0, 10).join(',\n  ');
              content = content.replace(/const CHANGELOG = \[[\s\S]*?\];/, `const CHANGELOG = [\n  ${trimmed}\n];`);
            }
          }
          fs.writeFileSync('app/page.js', content);
          console.log(`Updated: ${app} — ${msg}`);
          JS
      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add app/page.js
          git diff --staged --quiet || git commit -m "changelog: ${{ github.event.client_payload.app }} — ${{ github.event.client_payload.message }}"
          git push
